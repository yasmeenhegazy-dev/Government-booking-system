# Explicit Nixpacks phases so Railway installs both workspaces,
# builds the Vite SPA, and starts the Express server.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm --prefix backend install --include=dev",
  "npm --prefix frontend install --include=dev"
]

[phases.build]
cmds = ["npm --prefix frontend run build"]

[start]
cmd = "node backend/server.js"

[variables]
NODE_ENV = "production"
